name: Helpdesk Ticket\ndescription: Report a support issue or request\ntitle: "[SUPPORT] "\nlabels: ["helpdesk", "support"]\nbody:\n  - type: dropdown\n    attributes:\n      label: Category\n      description: Choose the type of issue\n      options:\n        - General Inquiry\n        - Technical Support\n        - Billing\n  - type: textarea\n    attributes:\n      label: Problem Description\n      placeholder: Describe your issue here...\n  - type: textarea\n    attributes:\n      label: Steps to Reproduce\n      placeholder: Steps to reproduce the issue...\n  - type: textarea\n    attributes:\n      label: Expected Behavior\n      placeholder: Describe what you expected to happen...\n  - type: textarea\n    attributes:\n      label: Actual Behavior\n      placeholder: Describe what actually happened...\n  - type: input\n    attributes:\n      label: Contact Email\n      placeholder: Enter your email...\n