name: Deploy Widget

on:
  push:
    branches:
      - main
    paths:
      - ai-agent-chat-loader.js
      - demo-host.html
      - README.md
      - .github/workflows/deploy-widget.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare deploy assets
        run: |
          mkdir -p dist
          cp ai-agent-chat-loader.js dist/ai-agent-chat-loader.js
          cp demo-host.html dist/demo-host.html
          cp demo-host.html dist/index.html

      - name: Publish rolling deployment release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="widget-latest"
          notes="Automated deployment from main at commit ${GITHUB_SHA}."

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" dist/ai-agent-chat-loader.js dist/demo-host.html --clobber
            gh release edit "${tag}" --title "Widget Latest" --notes "${notes}" --prerelease
          else
            gh release create "${tag}" dist/ai-agent-chat-loader.js dist/demo-host.html \
              --title "Widget Latest" \
              --notes "${notes}" \
              --prerelease
          fi

      - name: Deploy to SFTP
        if: success() && github.ref == 'refs/heads/main'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.FTP_SERVER }}
          port: ${{ secrets.FTP_PORT || '22' }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          source: "dist/ai-agent-chat-loader.js,dist/demo-host.html,dist/index.html"
          target: "/root/web/web-ai-agent/"
          strip_components: 1
