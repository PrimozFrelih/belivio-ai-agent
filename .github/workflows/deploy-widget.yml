name: Deploy Widget

on:
  push:
    branches:
      - main
    paths:
      - ai-agent-chat-loader.js
      - demo-host.html
      - README.md
      - .github/workflows/deploy-widget.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static artifact
        run: |
          mkdir -p public
          cp ai-agent-chat-loader.js public/ai-agent-chat-loader.js
          cp demo-host.html public/index.html
          if [ -f CNAME ]; then cp CNAME public/CNAME; fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
